<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Privacy Policy - DevLokaStudios
</title>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  margin:0;

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  background:#020617;

  font-family:Arial,sans-serif;

  color:white;

  text-align:center;

  overflow:hidden;

}

/* BACKGROUND */
#bg{

  position:fixed;

  inset:0;

  width:100%;
  height:100%;

  z-index:-10;

}

/* OVERLAY */
.overlay{

  position:fixed;

  inset:0;

  background:
  radial-gradient(
  circle at center,
  rgba(59,130,246,0.10),
  rgba(2,6,23,0.92)
  );

  z-index:-5;

}

/* CONTENT BOX */
.content{

  position:relative;

  z-index:10;

  padding:50px;

  border-radius:28px;

  background:
  rgba(15,23,42,0.45);

  border:
  1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(18px);

  box-shadow:
  0 0 40px rgba(0,0,0,0.25);

}

/* TITLE */
h1{

  font-size:70px;

  margin-bottom:14px;

  background:
  linear-gradient(
  to right,
  #ffffff,
  #93c5fd,
  #60a5fa
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  text-shadow:
  0 0 30px rgba(59,130,246,0.35);

}

/* SUBTITLE */
h2{

  font-size:26px;

  color:#93c5fd;

  font-weight:normal;

}

/* MOBILE */
@media(max-width:768px){

  h1{
    font-size:44px;
  }

  h2{
    font-size:20px;
  }

  .content{
    width:92%;
    padding:35px;
  }

}

</style>

</head>

<body>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENT -->
<div class="content">

  <h1>Privacy Policy</h1>

  <h2>DevLokaStudios</h2>

</div>

<script>

// ======================
// SCENE
// ======================

const scene =
new THREE.Scene();

// ======================
// CAMERA
// ======================

const camera =
new THREE.PerspectiveCamera(

  75,

  window.innerWidth /
  window.innerHeight,

  0.1,

  1000

);

camera.position.z = 12;

// ======================
// RENDERER
// ======================

const renderer =
new THREE.WebGLRenderer({

  canvas:
  document.getElementById("bg"),

  antialias:true,

  alpha:true

});

renderer.setSize(

  window.innerWidth,

  window.innerHeight

);

renderer.setPixelRatio(

  Math.min(
    window.devicePixelRatio,
    2
  )

);

// ======================
// PARTICLES
// ======================

const particlesGeometry =
new THREE.BufferGeometry();

const particleCount = 17000;

const positions =
new Float32Array(
  particleCount * 3
);

const colors =
new Float32Array(
  particleCount * 3
);

// CREATE PARTICLES

for(let i = 0; i < particleCount; i++){

  const i3 = i * 3;

  positions[i3] =
  (Math.random() - 0.5) * 70;

  positions[i3 + 1] =
  (Math.random() - 0.5) * 70;

  positions[i3 + 2] =
  (Math.random() - 0.5) * 70;

  colors[i3] = 0.3;
  colors[i3 + 1] = 0.6;
  colors[i3 + 2] = 1;

}

// POSITION

particlesGeometry.setAttribute(

  "position",

  new THREE.BufferAttribute(
    positions,
    3
  )

);

// COLOR

particlesGeometry.setAttribute(

  "color",

  new THREE.BufferAttribute(
    colors,
    3
  )

);

// ======================
// MATERIAL
// ======================

const particlesMaterial =
new THREE.PointsMaterial({

  size:0.06,

  vertexColors:true,

  transparent:true,

  opacity:0.9,

  blending:
  THREE.AdditiveBlending,

  depthWrite:false

});

// ======================
// PARTICLE SYSTEM
// ======================

const particlesMesh =
new THREE.Points(

  particlesGeometry,

  particlesMaterial

);

scene.add(particlesMesh);

// ======================
// MOUSE
// ======================

let mouseX = 0;
let mouseY = 0;

document.addEventListener(

  "mousemove",

  (event)=>{

    mouseX =
    event.clientX /
    window.innerWidth - 0.5;

    mouseY =
    event.clientY /
    window.innerHeight - 0.5;

  }

);

// ======================
// RESIZE
// ======================

window.addEventListener(

  "resize",

  ()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(

      window.innerWidth,

      window.innerHeight

    );

  }

);

// ======================
// ANIMATION
// ======================

const clock =
new THREE.Clock();

function animate(){

  requestAnimationFrame(animate);

  const elapsedTime =
  clock.getElapsedTime();

  // ROTATION

  particlesMesh.rotation.y =
  elapsedTime * 0.05;

  particlesMesh.rotation.x =
  elapsedTime * 0.03;

  // INTERACTION

  particlesMesh.rotation.y +=
  mouseX * 0.22;

  particlesMesh.rotation.x +=
  mouseY * 0.12;

  // FLOATING

  particlesMesh.position.y =
  Math.sin(
    elapsedTime * 0.5
  ) * 0.5;

  // CAMERA

  camera.position.x +=

  (mouseX * 2
  - camera.position.x)

  * 0.02;

  camera.position.y +=

  (-mouseY * 2
  - camera.position.y)

  * 0.02;

  camera.lookAt(scene.position);

  renderer.render(
    scene,
    camera
  );

}

animate();

</script>

</body>
</html>
