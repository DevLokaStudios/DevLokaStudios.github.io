<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DevLokaStudios</title>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  overflow:hidden;

  font-family:Arial,sans-serif;

  background:#020617;

  color:white;

}

/* BACKGROUND */
#bg{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  z-index:-10;

}

/* DARK OVERLAY */
.overlay{

  position:fixed;

  inset:0;

  background:
  radial-gradient(
  circle at center,
  rgba(15,23,42,0.15),
  rgba(2,6,23,0.85)
  );

  z-index:-5;

}

/* MAIN CONTENT */
.content{

  position:relative;

  z-index:10;

  min-height:100vh;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;

  padding:20px;

}

/* TITLE */
h1{

  font-size:90px;

  background:
  linear-gradient(
  to right,
  #ffffff,
  #93c5fd,
  #60a5fa
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  letter-spacing:3px;

  margin-bottom:50px;

  text-shadow:
  0 0 25px rgba(96,165,250,0.4);

}

/* BUTTONS */
.buttons{

  display:flex;

  gap:25px;

  flex-wrap:wrap;

  justify-content:center;

}

/* BUTTON STYLE */
.btn{

  display:inline-block;

  padding:18px 34px;

  border-radius:16px;

  text-decoration:none;

  color:white;

  font-size:18px;

  font-weight:bold;

  background:
  linear-gradient(
  135deg,
  rgba(37,99,235,0.9),
  rgba(29,78,216,0.9)
  );

  border:
  1px solid rgba(255,255,255,0.08);

  transition:
  transform 0.35s ease,
  box-shadow 0.35s ease;

}

/* HOVER */
.btn:hover{

  transform:
  translateY(-6px)
  scale(1.06);

  box-shadow:
  0 0 30px rgba(59,130,246,0.45),
  0 0 80px rgba(59,130,246,0.2);

}

/* FOOTER */
footer{

  position:absolute;

  bottom:20px;

  width:100%;

  text-align:center;

  color:#94a3b8;

  font-size:14px;

}

/* MOBILE */
@media(max-width:768px){

  h1{
    font-size:52px;
  }

  .btn{

    width:100%;

    max-width:320px;

  }

}

</style>

</head>

<body>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENT -->
<div class="content">

  <!-- TITLE -->
  <h1>DevLokaStudios</h1>

  <!-- WORKING BUTTONS -->
  <div class="buttons">

    <a href="./game1.html" class="btn">
      🚗 Turbo Realm Racing
    </a>

    <a href="./game2.html" class="btn">
      🕹️ Runfinity
    </a>

  </div>

</div>

<!-- FOOTER -->
<footer>

  Contact: devlokstudiossupport@gmail.com
  <br>
  © 2026 DevLokaStudios

</footer>

<script>

// ======================
// SCENE
// ======================

const scene =
new THREE.Scene();

// ======================
// CAMERA
// ======================

const camera =
new THREE.PerspectiveCamera(

  75,

  window.innerWidth /
  window.innerHeight,

  0.1,

  1000

);

camera.position.z = 12;

// ======================
// RENDERER
// ======================

const renderer =
new THREE.WebGLRenderer({

  canvas:
  document.getElementById("bg"),

  antialias:true,

  alpha:true

});

renderer.setSize(

  window.innerWidth,

  window.innerHeight

);

renderer.setPixelRatio(

  Math.min(
    window.devicePixelRatio,
    2
  )

);

// ======================
// PARTICLES
// ======================

const particlesGeometry =
new THREE.BufferGeometry();

const particleCount = 15000;

const positions =
new Float32Array(
  particleCount * 3
);

const colors =
new Float32Array(
  particleCount * 3
);

// CREATE PARTICLES

for(let i = 0; i < particleCount; i++){

  const i3 = i * 3;

  positions[i3] =
  (Math.random() - 0.5) * 60;

  positions[i3 + 1] =
  (Math.random() - 0.5) * 60;

  positions[i3 + 2] =
  (Math.random() - 0.5) * 60;

  colors[i3] = 0.3;
  colors[i3 + 1] = 0.6;
  colors[i3 + 2] = 1;

}

// POSITIONS

particlesGeometry.setAttribute(

  "position",

  new THREE.BufferAttribute(
    positions,
    3
  )

);

// COLORS

particlesGeometry.setAttribute(

  "color",

  new THREE.BufferAttribute(
    colors,
    3
  )

);

// ======================
// MATERIAL
// ======================

const particlesMaterial =
new THREE.PointsMaterial({

  size:0.06,

  vertexColors:true,

  transparent:true,

  opacity:0.9,

  blending:
  THREE.AdditiveBlending,

  depthWrite:false

});

// ======================
// PARTICLE MESH
// ======================

const particlesMesh =
new THREE.Points(

  particlesGeometry,

  particlesMaterial

);

scene.add(particlesMesh);

// ======================
// MOUSE
// ======================

let mouseX = 0;
let mouseY = 0;

document.addEventListener(

  "mousemove",

  (event)=>{

    mouseX =
    event.clientX /
    window.innerWidth - 0.5;

    mouseY =
    event.clientY /
    window.innerHeight - 0.5;

  }

);

// ======================
// RESIZE
// ======================

window.addEventListener(

  "resize",

  ()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(

      window.innerWidth,

      window.innerHeight

    );

  }

);

// ======================
// ANIMATION
// ======================

const clock =
new THREE.Clock();

function animate(){

  requestAnimationFrame(animate);

  const elapsedTime =
  clock.getElapsedTime();

  // ROTATION

  particlesMesh.rotation.y =
  elapsedTime * 0.05;

  particlesMesh.rotation.x =
  elapsedTime * 0.03;

  // INTERACTION

  particlesMesh.rotation.y +=
  mouseX * 0.35;

  particlesMesh.rotation.x +=
  mouseY * 0.2;

  // FLOATING

  particlesMesh.position.y =
  Math.sin(
    elapsedTime * 0.5
  ) * 0.5;

  // CAMERA MOVEMENT

  camera.position.x +=

  (mouseX * 2
  - camera.position.x)

  * 0.02;

  camera.position.y +=

  (-mouseY * 2
  - camera.position.y)

  * 0.02;

  camera.lookAt(scene.position);

  renderer.render(
    scene,
    camera
  );

}

animate();

</script>

</body>
</html>
